---
name: Main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    name: Tests with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gir1.2-gstreamer-1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libcairo2-dev libgirepository-2.0-dev
      - name: Install Python dependencies
        run: |
          uv sync --dev --all-extras
      - name: Run tests
        run: |
          uv run pytest -vvv
      - name: Test source distribution
        run: |
          rm -fr dist
          uv build --sdist
          tar -C dist -axvf dist/*.tar.gz
          ( cd dist/*/; uv build )
          ( cd dist/*/; uv sync --dev --all-extras )
          ( cd dist/*/; uv run pytest )
